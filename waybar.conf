{
    "layer": "top",
    "position": "top",
    "height": 30,
    "modules-left": ["sway/workspaces", "sway/mode"],
    "modules-center": ["clock"],
    "modules-right": ["network", "battery", "pulseaudio", "tray"],

    "sway/workspaces": {
        "disable-scroll": true,
        "all-outputs": true
    },
    "clock": {
        "format": "{:%H:%M  %d/%m/%Y}"
    },
    "battery": {
        "format": "♥ {capacity}%",
        "format-charging": "⚡ {capacity}%"
    },
    "network": {
        "format-wifi": "✿ {essid}",
        "format-disconnected": "✗ offline"
    },
    "pulseaudio": {
        "format": "♪ {volume}%",
        "format-muted": "✗ mute"
    },
    "tray": {
        "spacing": 10
    }
}
