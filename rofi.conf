configuration {
    modi: "drun,run";
    show-icons: true;
    drun-display-format: "{name}";
}

* {
    background-color: #1e1e2e;
    border-color: #f5c2e7;
    text-color: #cdd6f4;
    font: "Hack 11";
}

window {
    width: 500px;
    border: 2px;
    border-radius: 8px;
    background-color: #1e1e2e;
}

mainbox {
    padding: 12px;
}

inputbar {
    background-color: #313244;
    border-radius: 6px;
    padding: 8px;
    margin: 0 0 12px 0;
    children: [prompt, entry];
}

prompt {
    color: #f5c2e7;
    margin: 0 8px 0 0;
}

entry {
    color: #ffffff;
}

listview {
    lines: 8;
    spacing: 4px;
}

element {
    padding: 8px;
    border-radius: 4px;
}

element selected {
    background-color: #313244;
    text-color: #f5c2e7;
}

element-text {
    color: inherit;
}

@theme "/usr/share/rofi/themes/purple.rasi"
